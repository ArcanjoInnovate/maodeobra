name: dartobra_new
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # =========================
  # FIREBASE (VERSÕES ESTÁVEIS iOS)
  # =========================
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  timeago: ^3.7.1
  firebase_database: ^11.3.0
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.1.0

  # Helpers Firebase / reatividade
  rxdart: ^0.28.0

  # Device
  device_info_plus: ^10.0.0

  # =========================
  # MEDIA
  # =========================
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  video_compress: ^3.1.3
  video_player: ^2.9.2
  chewie: ^1.8.5
  cached_network_image: ^3.3.1

  # =========================
  # STORAGE
  # =========================
  path_provider: ^2.1.5
  path: ^1.9.0

  # =========================
  # STATE MANAGEMENT
  # =========================
  provider: ^6.1.2

  # local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # =========================
  # NOTIFICAÇÕES LOCAIS
  # =========================
  flutter_local_notifications: ^17.2.3

  # =========================
  # PERMISSÕES
  # =========================
  permission_handler: ^11.3.1

  # =========================
  # NETWORK
  # =========================
  http: ^1.2.2
  url_launcher: ^6.3.1

  # CRYPTO
  web: ^1.0.0
  crypto: ^3.0.5
  cloud_functions: ^5.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/logo.webp"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.webp
    - assets/logo_no_bg.webp
    - assets/logos.webp